name: TypeScript Type Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  type-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    
    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        # Dummy DATABASE_URL for type-checking (no actual DB connection needed)
        DATABASE_URL: postgresql://user:password@localhost:5432/dummy
    
    - name: Build Next.js (generates .next/types)
      run: npm run build
      env:
        # Required environment variables for build
        DATABASE_URL: postgresql://user:password@localhost:5432/dummy
        NEXTAUTH_SECRET: dummy-secret-for-ci-build
        NEXTAUTH_URL: http://localhost:3000
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: dummy-key
    
    - name: Run TypeScript type check
      run: |
        echo "Running TypeScript type check..."
        npm run type-check || (echo "Type check failed!" && exit 1)
    
    - name: Run ESLint
      run: npm run lint
      continue-on-error: true
