name: TypeScript Type Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  type-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install --legacy-peer-deps
      env:
        # Dummy environment variables for postinstall and build
        DATABASE_URL: postgresql://user:password@localhost:5432/dummy
        RESEND_API_KEY: re_dummy_key_for_build
        AWS_ACCESS_KEY_ID: dummy_access_key_id
        AWS_SECRET_ACCESS_KEY: dummy_secret_access_key
        AWS_S3_REGION: ap-southeast-1
        AWS_S3_BUCKET_NAME: dummy-bucket
    
    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        DATABASE_URL: postgresql://user:password@localhost:5432/dummy
    
    - name: Build Next.js (generates .next/types)
      run: npm run build
      env:
        # All required environment variables for Next.js build
        DATABASE_URL: postgresql://user:password@localhost:5432/dummy
        NEXTAUTH_SECRET: dummy-secret-for-ci-build-min-32-chars-long
        NEXTAUTH_URL: http://localhost:3000
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: dummy-google-maps-api-key
        RESEND_API_KEY: re_dummy_key_for_build
        AWS_ACCESS_KEY_ID: dummy_access_key_id
        AWS_SECRET_ACCESS_KEY: dummy_secret_access_key
        AWS_S3_REGION: ap-southeast-1
        AWS_S3_BUCKET_NAME: dummy-bucket
    
    - name: Run TypeScript type check
      run: |
        echo "Running TypeScript type check..."
        npm run type-check || (echo "Type check failed!" && exit 1)
    
    - name: Run ESLint
      run: npm run lint
      continue-on-error: true
